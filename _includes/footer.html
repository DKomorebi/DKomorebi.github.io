    <footer class="site-footer">
      <div class="wrap inner">
        <a class="brand" href="/"><span class="drop"></span>{{ site.title }}</a>
        <div class="flinks">
          {% for nav in site.navs %}<a href="{{ nav.href }}">{{ nav.label }}</a>{% endfor %}
          <a href="{{ site.subscribe_rss }}">RSS</a>
          <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        </div>
        <div>© {{ site.since }}–{{ site.time | date: '%Y' }} {{ site.author }} · {{ site.subtitle }}</div>
      </div>
    </footer>

    <button id="back-to-top" class="back-to-top" title="回到顶部" aria-label="Back to Top">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
    </button>
</body>
</html>
