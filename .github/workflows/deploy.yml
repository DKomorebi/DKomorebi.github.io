name: Deploy Jekyll with WebP
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 升级到了 @v4.2.2+ 版本，彻底解决 Node 20 废弃的 Warning
      - uses: actions/checkout@v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      # 【核心修复步骤】在 build 之前强行清一下缓存并更新可能冲突的 Gem
      - name: Update bundler and gems
        run: |
          gem update --system
          bundle update

      # 升级到了支持 Node 24 的最新版 setup-node
      - uses: actions/setup-node@v4.1.0
        with:
          node-version: '24' # 顺应 GitHub 趋势，直接用 Node 24
          cache: 'npm'

      - run: npm install

      # 如果你的脚本里有调用本地编译，执行转换
      - run: npm run convert-webp || echo "Skip if command not found"

      - run: bundle exec jekyll build

      - run: npm run post-build || echo "Skip if command not found"

      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4